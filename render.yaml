databases:
  - name: vouch-db
    plan: free
    databaseName: vouch
    user: vouch

services:
  # --- Backend API ---
  - type: web
    name: vouch-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vouch-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: vouch-web
          type: web
          property: host
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: TICKETMASTER_API_KEY
        sync: false
      # Gate for /users/admin/promote-tastemaker. Used by populate_tastemakers.py
      # during seeding only. Rotate from the Render dashboard after seeding.
      - key: ADMIN_SECRET
        value: vouch-tastemaker-seed-2026-q2-internal

  # --- Frontend Static Site ---
  - type: web
    name: vouch-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: vouch-api
          type: web
          property: host
